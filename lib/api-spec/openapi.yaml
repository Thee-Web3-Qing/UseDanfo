        duration_min:
          type: number
        polyline:
          type: ["string", "null"]
        warnings:
          type: array
          items:
            type: string
        origin_lat:
          type: number
        origin_lng:
          type: number
        dest_lat:
          type: number
        dest_lng:
          type: number

    GeoReverseResponse:
      type: object
      required: [primary_address, city]
      properties:
        primary_address:
          type: string
        neighborhood:
          type: string
        city:
          type: string
        nearest_landmark:
          type: string
        nearest_landmark_category:
          type: string
        distance_to_landmark_meters:
          type: number

    DanfoGptInput:
