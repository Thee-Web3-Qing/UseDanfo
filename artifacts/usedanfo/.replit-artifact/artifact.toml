kind = "web"
previewPath = "/"
title = "UseDanfo"
version = "1.0.0"
id = "artifacts/usedanfo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19375

[services.development]
run = "pnpm --filter @workspace/usedanfo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/usedanfo", "run", "build" ]
publicDir = "artifacts/usedanfo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19375"
BASE_PATH = "/"
